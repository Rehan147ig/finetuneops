version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  worker:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  postgres:
    restart: always

  redis:
    restart: always

# SSL termination placeholder:
# Terminate TLS ahead of the app with a reverse proxy or load balancer in production.
